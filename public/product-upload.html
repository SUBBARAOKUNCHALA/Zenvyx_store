<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Product</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      padding: 40px 16px;
      background: linear-gradient(135deg, #fdf2f8, #faf5ff);
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: #fff;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      color: #4c1d95;
    }

    p {
      margin: 0 0 24px;
      color: #6b7280;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #374151;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      outline: none;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      width: 100%;
      border: none;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      color: #fff;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    .msg {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }

    .success {
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .previewGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .previewImg {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      background: #fafafa;
    }

    .hint {
      font-size: 12px;
      color: #6b7280;
      margin-top: 6px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Product Upload</h1>
    <p>Add product with multiple images, discount, and sizes.</p>

    <form id="productForm" enctype="multipart/form-data">
      <div class="field">
        <label for="name">Product Name</label>
        <input type="text" id="name" name="name" required />
      </div>

      <div class="field">
        <label for="description">Description</label>
        <textarea id="description" name="description" required></textarea>
      </div>

      <div class="field">
        <label for="price">Price</label>
        <input type="number" id="price" name="price" required />
      </div>

      <div class="field">
        <label for="discount">Discount (%)</label>
        <input type="number" id="discount" name="discount" min="0" max="100" value="0" />
      </div>

      <div class="field">
        <label for="category">Category</label>
        <select id="category" name="category" required>
          <option value="">Select category</option>
          <option value="Shirt">Shirt</option>
          <option value="T-Shirt">T-Shirt</option>
          <option value="Pant">Pant</option>
        </select>
      </div>

      <div class="field">
        <label for="subCategory">Sub Category</label>
        <select id="subCategory" name="subCategory" required>
          <option value="">Select sub category</option>
        </select>
        <div class="hint">Sub category options will change based on selected category.</div>
      </div>

      <div class="field">
        <label for="stock">Stock</label>
        <input type="number" id="stock" name="stock" value="10" required />
      </div>

      <div class="field">
        <label for="sizes">Sizes</label>
        <input type="text" id="sizes" placeholder='Example: ["S","M","L"] or ["30","32","34"]' required />
        <div class="hint">Enter valid JSON array format only.</div>
      </div>

      <div class="field">
        <label for="images">Product Images</label>
        <input type="file" id="images" name="images" accept="image/*" multiple required />
        <div class="hint">Select at least 1 image. You can upload multiple images.</div>
        <div id="previewGrid" class="previewGrid"></div>
      </div>

      <button type="submit">Upload Product</button>
    </form>

    <div id="successMsg" class="msg success"></div>
    <div id="errorMsg" class="msg error"></div>
  </div>

  <script>
  const form = document.getElementById("productForm");
  const successMsg = document.getElementById("successMsg");
  const errorMsg = document.getElementById("errorMsg");
  const imagesInput = document.getElementById("images");
  const previewGrid = document.getElementById("previewGrid");
  const sizesInput = document.getElementById("sizes");
  const categorySelect = document.getElementById("category");
  const subCategorySelect = document.getElementById("subCategory");

  const subCategoryMap = {
    "Shirt": [
      "Formal Shirts",
      "Casual Shirts",
      "Printed Shirts",
      "Party Wear",
      "Trending Shirts"
    ],
    "T-Shirt": [
      "Round Neck",
      "Polo T-Shirts",
      "Cotton T-Shirts"
    ],
    "Pant": [
      "Jeans",
      "Cargo Pants",
      "Formal Pants"
    ]
  };

  categorySelect.addEventListener("change", () => {
    const selectedCategory = categorySelect.value;
    const subCategories = subCategoryMap[selectedCategory] || [];

    subCategorySelect.innerHTML = `<option value="">Select sub category</option>`;

    subCategories.forEach((item) => {
      const option = document.createElement("option");
      option.value = item;
      option.textContent = item;
      subCategorySelect.appendChild(option);
    });
  });

  imagesInput.addEventListener("change", (e) => {
    previewGrid.innerHTML = "";
    const files = Array.from(e.target.files || []);

    files.forEach((file) => {
      const reader = new FileReader();
      reader.onload = function (event) {
        const img = document.createElement("img");
        img.src = event.target.result;
        img.className = "previewImg";
        img.alt = "Preview";
        previewGrid.appendChild(img);
      };
      reader.readAsDataURL(file);
    });
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    successMsg.style.display = "none";
    errorMsg.style.display = "none";

    try {
      let parsedSizes;

      try {
        parsedSizes = JSON.parse(sizesInput.value.trim());
        if (!Array.isArray(parsedSizes)) {
          throw new Error("Sizes must be an array");
        }
      } catch (err) {
        throw new Error('Sizes must be valid JSON array. Example: ["S","M","L"]');
      }

      const formData = new FormData();

      const selectedCategory = document.getElementById("category").value;
      const selectedSubCategory = document.getElementById("subCategory").value;

      if (!selectedCategory) {
        throw new Error("Please select category");
      }

      if (!selectedSubCategory) {
        throw new Error("Please select sub category");
      }

      formData.append("name", document.getElementById("name").value);
      formData.append("description", document.getElementById("description").value);
      formData.append("price", document.getElementById("price").value);
      formData.append("discount", document.getElementById("discount").value);
      formData.append("category", selectedCategory);
      formData.append("subCategory", selectedSubCategory);
      formData.append("stock", document.getElementById("stock").value);
      formData.append("sizes", JSON.stringify(parsedSizes));

      const files = Array.from(imagesInput.files || []);
      if (files.length === 0) {
        throw new Error("Please select at least one image");
      }

      files.forEach((file) => {
        formData.append("images", file);
      });

      const token = localStorage.getItem("token");

      const res = await fetch("/api/products", {
        method: "POST",
        headers: token ? { Authorization: `Bearer ${token}` } : {},
        body: formData,
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.message || "Upload failed");
      }

      successMsg.textContent = data.message || "Product uploaded successfully";
      successMsg.style.display = "block";

      form.reset();
      previewGrid.innerHTML = "";
      subCategorySelect.innerHTML = `<option value="">Select sub category</option>`;
    } catch (error) {
      errorMsg.textContent = error.message || "Something went wrong";
      errorMsg.style.display = "block";
    }
  });
</script>
</body>

</html>
