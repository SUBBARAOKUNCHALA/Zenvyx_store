<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Product</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      padding: 40px 16px;
      background: linear-gradient(135deg, #fdf2f8, #faf5ff);
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: #fff;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      color: #4c1d95;
    }

    p {
      margin: 0 0 24px;
      color: #6b7280;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #374151;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      outline: none;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      width: 100%;
      border: none;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      color: #fff;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    .msg {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }

    .success {
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .preview {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      display: none;
      background: #fafafa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Product Upload</h1>
    <p>Add real clothing products with image upload.</p>

    <form id="productForm" enctype="multipart/form-data">
      <div class="field">
        <label for="name">Product Name</label>
        <input type="text" id="name" name="name" required />
      </div>

      <div class="field">
        <label for="description">Description</label>
        <textarea id="description" name="description" required></textarea>
      </div>

      <div class="field">
        <label for="price">Price</label>
        <input type="number" id="price" name="price" required />
      </div>

      <div class="field">
        <label for="category">Category</label>
        <select id="category" name="category" required>
          <option value="">Select category</option>
          <option value="Shirt">Shirt</option>
          <option value="T-Shirt">T-Shirt</option>
          <option value="Pant">Pant</option>
        </select>
      </div>

      <div class="field">
        <label for="stock">Stock</label>
        <input type="number" id="stock" name="stock" value="10" required />
      </div>

      <div class="field">
        <label for="sizes">Sizes</label>
        <input
          type="text"
          id="sizes"
          name="sizes"
          placeholder="Example: S,M,L or 30,32,34"
          required
        />
      </div>

      <div class="field">
        <label for="image">Product Image</label>
        <input type="file" id="image" name="image" accept="image/*" required />
        <img id="preview" class="preview" alt="Preview" />
      </div>

      <button type="submit">Upload Product</button>
    </form>

    <div id="successMsg" class="msg success"></div>
    <div id="errorMsg" class="msg error"></div>
  </div>

  <script>
    const form = document.getElementById("productForm");
    const successMsg = document.getElementById("successMsg");
    const errorMsg = document.getElementById("errorMsg");
    const imageInput = document.getElementById("image");
    const preview = document.getElementById("preview");

    imageInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) {
        preview.style.display = "none";
        return;
      }

      const reader = new FileReader();
      reader.onload = function (event) {
        preview.src = event.target.result;
        preview.style.display = "block";
      };
      reader.readAsDataURL(file);
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      successMsg.style.display = "none";
      errorMsg.style.display = "none";

      const formData = new FormData(form);

      try {
        const res = await fetch("/api/products", {
          method: "POST",
          body: formData,
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || "Upload failed");
        }

        successMsg.textContent = data.message || "Product uploaded successfully";
        successMsg.style.display = "block";

        form.reset();
        preview.style.display = "none";
      } catch (error) {
        errorMsg.textContent = error.message || "Something went wrong";
        errorMsg.style.display = "block";
      }
    });
  </script>
</body>
</html>
